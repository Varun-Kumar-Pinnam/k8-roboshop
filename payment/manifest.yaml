apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  #these labels are replicaset lables
  labels:
    project: roboshop
    tier: backend
    component: payment
spec:
  replicas: 1
  selector: 
    # using these labels replicaset selects the pod
      matchLabels:
        project: roboshop
        tier: backend
        component: payment
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: payment
    spec:
      containers:
      - name: payment 
        image: varunkumarpinnam/payment:1.2.0
        imagePullPolicy: Always # safe to pull everytime, there may be images with same version rebuilt and pushed
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "150Mi"
            cpu: "150m"        
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
           name: payment
      
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
      project: roboshop
      tier: backend
      component: payment
spec:
  selector:
  # labels are used as selectors
    project: roboshop
    tier: backend
    component: payment
  ports:
  - protocol: TCP
    port: 8080 #servie port
    targetPort: 8080 # container port

      