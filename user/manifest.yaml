apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
data:
  MONGO: "true"
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  #these labels are replicaset lables
  labels:
    project: roboshop
    tier: backend
    component: user
spec:
  replicas: 1
  selector: 
    # using these labels replicaset selects the pod
      matchLabels:
        project: roboshop
        tier: backend
        component: user
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: user
    spec:
      containers:
      - name: user 
        image: varunkumarpinnam/user:1.2.0
        imagePullPolicy: Always # safe to pull everytime, there may be images with same version rebuilt and pushed
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "150Mi"
            cpu: "150m"        
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
           name: user
      
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop
  labels:
      project: roboshop
      tier: backend
      component: user
spec:
  selector:
  # labels are used as selectors
    project: roboshop
    tier: backend
    component: user
  ports:
  - protocol: TCP
    port: 8080 #servie port
    targetPort: 8080 # container port

      