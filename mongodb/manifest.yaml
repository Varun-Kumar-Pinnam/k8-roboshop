apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  #these labels are replicaset lables
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
 replicas: 1
 selector: 
  # using these labels replicaset selects the pod
    matchLabels:
      project: roboshop
      tier: db
      component: mongodb
    template:
      metadata:
        labels:
          project: roboshop
          tier: db
          component: mongodb
      spec:
        containers:
        - name: mongodb 
          image: varunkumarpinnam/mongodb:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  selector:
  # labels are used as selectors
    project: roboshop
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017 # servie port
    targetPort: 27017 # container port

      